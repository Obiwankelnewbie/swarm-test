<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Creator | Intelligence Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Instrument Serif"', 'serif'],
                        sans: ['Barlow', 'sans-serif'],
                    },
                    colors: {
                        swarmGreen: '#4ADE80',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; margin: 0; padding: 0; }
        
        .liquid-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .swarm-node {
            background: rgba(74, 222, 128, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(74, 222, 128, 0.3);
            box-shadow: 0 0 50px rgba(74, 222, 128, 0.15);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(74, 222, 128, 0.1); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(74, 222, 128, 0.25); }
        }

        /* Animation des lignes de données */
        .data-flow {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to top, transparent, #4ADE80, transparent);
            animation: flow 2s linear infinite;
        }

        @keyframes flow {
            0% { transform: translateY(100px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
